<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" id="meta-description" content="Portafolio profesional">
    <meta name="author" content="Aitor Gallego Lozano">
    <meta name="keywords" content="nóminas, administración, finanzas, RRHH, técnico, Madrid">
    
    <title id="page-title">Portafolio</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👤</text></svg>">
</head>
<body>
    <!-- Canvas de fondo para partículas -->
    <canvas id="particleCanvas"></canvas>
    
    <!-- Botón de modo oscuro/claro -->
    <button id="themeToggle" class="theme-toggle" aria-label="Cambiar tema">
        <span class="toggle-icon">🌙</span>
    </button>

    <!-- Botón de cambio de idioma -->
    <button id="langToggle" class="lang-toggle" aria-label="Cambiar idioma">
        <span class="lang-label">EN</span>
    </button>
    
    <!-- Navegación -->
    <nav id="navbar" class="navbar">
        <div class="nav-container">
            <a href="#inicio" class="nav-logo" id="nav-logo">AG</a>
            <button id="navToggle" class="nav-toggle" aria-label="Abrir menú">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="#inicio" class="nav-link" id="nav-link-inicio"></a></li>
                <li><a href="#sobre-mi" class="nav-link" id="nav-link-sobre"></a></li>
                <li><a href="#experiencia" class="nav-link" id="nav-link-experiencia"></a></li>
                <li><a href="#habilidades" class="nav-link" id="nav-link-habilidades"></a></li>
                <li><a href="#logros" class="nav-link" id="nav-link-logros"></a></li>
                <li><a href="#contacto" class="nav-link" id="nav-link-contacto"></a></li>
            </ul>
        </div>
    </nav>
    
    <!-- Sección Hero -->
    <section id="inicio" class="hero">
        <div class="container">
            <div class="hero-content">
                <h1 class="hero-title">
                    <span id="hero-greeting"></span>
                    <span class="hero-name" id="hero-name"></span>
                </h1>
                <div class="hero-subtitle">
                    <span class="typewriter" id="hero-role"></span>
                </div>
                <p class="hero-description" id="hero-description"></p>
                
                <div class="hero-stats" id="hero-stats">
                    <div class="stat-item">
                        <span class="stat-number" data-count="60">0</span>
                        <span class="stat-label" id="stats-empresas"></span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number" data-count="12">0</span>
                        <span class="stat-label" id="stats-plataformas"></span>
                    </div>
                </div>
                
                <div class="hero-buttons">
                    <a href="#contacto" class="btn btn-primary" id="btn-contacto"></a>
                    <a href="docs/CV_Aitor_Gallego.pdf" class="btn btn-secondary" id="btn-cv"></a>
                </div>
            </div>
            <div class="hero-image">
                <div class="profile-photo">
                    <img src="fotos/perfil (2).jpg" alt="Aitor Gallego" id="hero-image">
                </div>
            </div>
        </div>
        <div class="scroll-indicator">
            <span id="scroll-down"></span>
            <div class="arrow-down"></div>
        </div>
    </section>
    
    <!-- Sección Sobre Mí -->
    <section id="sobre-mi" class="about section">
        <div class="container">
            <h2 class="section-title" id="about-title"></h2>
            <div class="about-content">
                <div class="about-text">
                    <p class="about-description" id="about-description"></p>
                </div>
                <div class="about-details">
                    <div class="detail-item">
                        <span class="detail-icon">📍</span>
                        <div class="detail-info">
                            <h4 id="detail-ubicacion-title"></h4>
                            <p id="detail-location"></p>
                        </div>
                    </div>
                    <div class="detail-item">
                        <span class="detail-icon">📧</span>
                        <div class="detail-info">
                            <h4 id="detail-email-title"></h4>
                            <p id="detail-email"></p>
                        </div>
                    </div>
                    <div class="detail-item">
                        <span class="detail-icon">📱</span>
                        <div class="detail-info">
                            <h4 id="detail-telefono-title"></h4>
                            <p id="detail-phone"></p>
                        </div>
                    </div>
                    <div class="detail-item">
                        <span class="detail-icon">🎂</span>
                        <div class="detail-info">
                            <h4 id="detail-edad-title"></h4>
                            <p id="detail-birth"></p>
                        </div>
                    </div>
                    <div class="detail-item">
                        <span class="detail-icon">🚗</span>
                        <div class="detail-info">
                            <h4 id="detail-carnet-title"></h4>
                            <p id="detail-driving"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    
    <!-- Sección Experiencia -->
    <section id="experiencia" class="experience section">
        <div class="container">
            <h2 class="section-title" id="experience-title"></h2>
            <div class="timeline" id="timeline">
                <!-- Se genera dinámicamente desde JS -->
            </div>
        </div>
    </section>
    
    <!-- Sección Habilidades -->
    <section id="habilidades" class="skills section">
        <div class="container">
            <h2 class="section-title" id="skills-title"></h2>
            <div class="skills-grid" id="skills-grid">
                <!-- Se genera dinámicamente desde JS -->
            </div>
        </div>
    </section>
    
    <!-- Sección Logros/Proyectos -->
    <section id="logros" class="projects section">
        <div class="container">
            <h2 class="section-title" id="projects-title"></h2>
            <div class="projects-grid" id="projects-grid">
                <!-- Se genera dinámicamente desde JS -->
            </div>
        </div>
    </section>
    
    <!-- Sección Contacto -->
    <section id="contacto" class="contact section">
        <div class="container">
            <h2 class="section-title" id="contact-title"></h2>
            <div class="contact-content">
                <div class="contact-info">
                    <p class="contact-description" id="contact-description"></p>
                    <div class="contact-methods" id="contact-methods">
                        <!-- Se genera dinámicamente desde JS -->
                    </div>
                </div>
            </div>
        </div>
    </section>
    
    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p class="footer-text" id="footer-text"></p>
        </div>
    </footer>
    
    <!-- Bibliotecas JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    
    <!-- Scripts de la aplicación - ORDEN CRÍTICO -->
    <script src="LANG/ES/esp.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
